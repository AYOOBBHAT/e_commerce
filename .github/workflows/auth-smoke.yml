name: Auth smoke tests

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install deps
        run: npm ci
      - name: Run auth smoke script
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
        run: node scripts/test-auth-flow.js
